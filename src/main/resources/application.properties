spring.application.name=worker

# ── Datasource (apunta a la BD de ms-customer-service) ──────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/ms_customer_db
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA (solo lectura/actualización de outbox; sin DDL)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Kafka Producer ────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092

# ── Topics ───────────────────────────────────────────────────────────────────
kafka.topics.customer-events=customer-events

# ── Outbox poller ────────────────────────────────────────────────────────────
# Intervalo en milisegundos entre cada ciclo de polling (5 segundos por defecto)
outbox.poll.interval-ms=5000
